# Build slim SAM indexes without burning Render runtime or live Entity API quota.
#
# Setup:
#   1. GitHub → Settings → Secrets and variables → Actions → New secret
#      Name: SAM_API_KEY  Value: your SAM Account Details key
#   2. Actions → SAM data sync → Run workflow → mode: all
#
# Outputs:
#   - data/sam/exclusions_ueis.txt  (committed daily)
#   - Release tag sam-data-latest / entities.sqlite  (monthly)
#
# Render env (optional):
#   SAM_ENTITY_DB_URL=https://github.com/<owner>/<repo>/releases/download/sam-data-latest/entities.sqlite
#   SAM_DOWNLOAD_EXTRACTS=0   # never hit SAM from the web dyno

name: SAM data sync

on:
  schedule:
    # Daily exclusions (08:15 UTC)
    - cron: "15 8 * * *"
    # Monthly entities (2nd of month 09:00 UTC, after typical 1st-Sunday publish)
    - cron: "0 9 2 * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "What to refresh"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - exclusions
          - entities

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Decide mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 9 2 * *" ]; then
            echo "value=all" >> "$GITHUB_OUTPUT"
          else
            echo "value=exclusions" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync exclusions extract
        if: steps.mode.outputs.value == 'exclusions' || steps.mode.outputs.value == 'all'
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
        run: npm run sam:sync-exclusions
        continue-on-error: true

      - name: Sync monthly entity extract → SQLite
        if: steps.mode.outputs.value == 'entities' || steps.mode.outputs.value == 'all'
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
        run: npm run sam:sync-entities -- --force
        continue-on-error: true

      - name: Write data/sam/exclusions_ueis.txt
        if: steps.mode.outputs.value == 'exclusions' || steps.mode.outputs.value == 'all'
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
        run: npm run sam:publish-data
        continue-on-error: true

      - name: Commit exclusions list
        if: steps.mode.outputs.value == 'exclusions' || steps.mode.outputs.value == 'all'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sam/exclusions_ueis.txt
          if git diff --staged --quiet; then
            echo "No exclusions file changes"
          else
            git commit -m "chore(sam): refresh public exclusions UEI list"
            git push
          fi

      - name: Publish entities.sqlite Release
        if: steps.mode.outputs.value == 'entities' || steps.mode.outputs.value == 'all'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sam-data-latest
          name: SAM slim data
          body: |
            Slim SAM **public** extract indexes for grant-fraud-watch.

            | Asset | Contents |
            |-------|----------|
            | `entities.sqlite` | UEI → registration date, status, legal name |

            Built from SAM PUBLIC monthly entity extract (pipe-delimited V2).
            Set on Render: `SAM_ENTITY_DB_URL` to this asset URL.
          files: |
            .cache/sam/entities.sqlite
            data/sam/entities.sqlite
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
